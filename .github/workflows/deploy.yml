name: Deploy Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Inject Gist token
        run: |
          sed -i "s|GIST_TOKEN_PLACEHOLDER|${{ secrets.GIST_READ_TOKEN }}|g" index.html
          grep -q "GIST_TOKEN_PLACEHOLDER" index.html && echo "❌ PLACEHOLDER STILL EXISTS" || echo "✅ Token injected"
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
