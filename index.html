<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Render Queue</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #1f2937;
      --row-a: #0f172a;
      --row-b: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #273244;
      --green: #4ade80;
      --blue: #60a5fa;
      --yellow: #fbbf24;
      --red: #f87171;
      --bar-bg: #0a0f18;
      --radius: 6px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Verdana, monospace;
      padding: 12px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 12px;
    }

    .project {
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }

    .project-header {
      padding: 6px 12px;
      background: var(--panel-2);
      font-size: 12px;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      gap: 5px;
      align-items: center;
    }

    .project-meta {
      font-size: 12px;
      color: var(--muted);
      font-weight: normal;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th {
      padding: 6px 10px;
      font-size: 10px;
      line-height: 1.1;
      text-align: left;
      vertical-align: middle;
      background: var(--panel-2);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    
    td {
      padding: 6px 10px;
      font-size: 10px;
      line-height: 1.1;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cell-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    tbody tr {
      cursor: pointer;
    }
    
    tbody tr.selected {
      background: rgba(96, 165, 250, 0.14);
    }

    .mobile-list {
      display: none;
    }

    .m-row {
      padding: 16px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--row-a);
    }

    .m-row:nth-child(even) {
      background: var(--row-b);
    }

    .m-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .m-name {
      min-width: 0;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .m-status {
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .queued { color: #f8fafc; }
    .rendering { color: var(--green); }
    .done { color: #86efac; }

    .m-progress-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 5px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7dd3fc, #60a5fa);
    }

    .m-progress-text {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
    }

    .m-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.2;
    }

    .m-meta strong {
      color: var(--text);
    }
    
    .status {
      display: inline;
      padding: 0;
      border-radius: 0;
      background: none;
      font-size: 12px;
    }

    .status-queued {
      background: none;
      color: #fbbf24;
    }

    .status-rendering {
      background: none;
      color: #60a5fa;
    }

    .status-done {
      background: none;
      color: #86efac;
    }
    .prio-yellow {
      color: var(--yellow);
    }

    .prio-red {
      color: var(--red);
    }
    .machines-section {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }

    .section-title {
      margin: 0;
      padding: 10px 12px;
      background: var(--panel-2);
      font-size: 14px;
      font-weight: normal;
    }

    .machines-table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .machines-table th,
    .machines-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      line-height: 1.1;
      text-align: left;
      white-space: nowrap;
      font-size: 10px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .machines-mobile-list {
      display: none;
    }

    .machine-card {
      padding: 14px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--row-a);
    }

    .machine-card:nth-child(even) {
      background: var(--row-b);
    }

    .machine-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .machine-name {
      font-size: 12px;
      font-weight: 700;
      min-width: 0;
    }

    .machine-user {
      font-size: 11px;
      color: var(--muted);
    }

    .machine-status {
      display: inline;
      padding: 0;
      border-radius: 0;
      background: none;
      font-size: 12px;
      white-space: nowrap;
    }

    .machine-status.st-rendering {
      background: none;
      color: #60a5fa;
    }

    .machine-status.st-idle {
      background: none;
      color: #86efac;
    }

    .machine-status.st-offline {
      background: none;
      color: #797f87;
    }

    .machine-status.st-stalled {
      background: none;
      color: #f87171;
    }
    .section-header {
      padding: 10px 12px;
      background: var(--panel-2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .section-title {
      margin: 0;
      font-size: 14px;
      font-weight: normal;
    }

    .toggle-btn {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }

    .toggle-btn:hover {
      background: #182233;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .table-wrap {
        display: none;
      }

      .mobile-list {
        display: block;
      }

      .project-header {
        padding: 8px 10px;
        font-size: 14px;
      }

      .project-meta {
        font-size: 10px;
      }
      .m-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 4px 8px;
        font-size: 11px;
      }
      .machines-section .table-wrap {
        display: none;
      }
      .machines-mobile-list {
        display: block;
      }
      .m-status   { flex: 0 0 72px; }
      .m-priority { flex: 0 0 96px; }
      .m-eta      { flex: 0 0 58px; }
      .m-user     { flex: 1 1 auto; min-width: 0; }
    }
  </style>
</head>
<body>
  <h1>Render Queue</h1>
  <div id="app"></div>

  <script>
    const columns = [
      "Name", "User", "Status",
      "Progress", "Tasks", "est.", "Priority"
    ];
    let showAllMachines = false;
    let latestProjectsData = null;
    let latestMachinesData = [];

    function getStatusClass(status) {
      const s = status.toLowerCase();
      if (s.includes("rendering")) return "status-rendering";
      if (s.includes("queued")) return "status-queued";
      if (s.includes("done")) return "status-done";
      return "";
    }

    function getStatusTextClass(status) {
      const s = status.toLowerCase();
      if (s.includes("rendering")) return "rendering";
      if (s.includes("queued")) return "queued";
      if (s.includes("done")) return "done";
      return "";
    }

    function percentToNumber(value) {
      return parseInt(String(value).replace("%", ""), 10) || 0;
    }

    function renderDesktopProgress(value) {
      const num = percentToNumber(value);
      return `
        <div style="display:flex;align-items:center;gap:8px;min-width:140px;">
          <div class="progress-bar" style="width:90px;">
            <div class="progress-fill" style="width:${num}%"></div>
          </div>
          <span>${value}</span>
        </div>
      `;
    }
    
    function getPriorityClass(priority) {
      const p = parseInt(priority, 10) || 0;
      if (p > 75) return "prio-red";
      if (p > 60) return "prio-yellow";
      return "";
    }

    function renderCell(column, row) {
      if (column === "Status") {
        return `<span class="status ${getStatusClass(row[column])}">${row[column]}</span>`;
      }
      if (column === "Name") {
        return `<div class="cell-name">${row["Task_name"] ?? ""}</div>`;
      }
      if (column === "Progress" || column === "Task_Progress") {
        return renderDesktopProgress(row[column]);
      }
      if (column === "Priority") {
        const cls = getPriorityClass(row.Priority);
        return `<span class="${cls}">${row.Priority}</span>`;
      }
      return row[column] ?? "";
    }

    function createDesktopTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <colgroup>
              <col style="width: 33%">
              <col style="width: 10%">
              <col style="width: 12%">
              <col style="width: 15%">
              <col style="width: 10%">
              <col style="width: 10%">
              <col style="width: 10%">
            </colgroup>
            <thead>
              <tr>
                ${columns.map(col => `<th>${col}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  ${columns.map(col => `<td>${renderCell(col, row)}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function createMobileList(rows) {
      return `
        <div class="mobile-list">
          ${rows.map(row => {
            const progressNum = percentToNumber(row.Progress);
            return `
              <div class="m-row">
                <div class="m-top">
                  <div class="m-name">${row.Task_name}</div>
                  
                </div>

                <div class="m-progress-line">
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${progressNum}%"></div>
                  </div>
                  <div class="m-progress-text">${row.Progress} ${row.Tasks}</div>
                </div>

                <div class="m-meta">
                  <div class="m-status ${getStatusTextClass(row.Status)}">${row.Status}</div>
                  <span class="${getPriorityClass(row.Priority)}">Priority: ${row.Priority}</span>
                  <span>ETA ${row["est."]}</span>
                  <span><strong>${row.User}</strong></span>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function createProject(projectName, rows) {
      return `
        <section class="project">
          <div class="project-header">
            <span>${projectName}</span>
            <span class="project-meta">${rows.length} jobs</span>
          </div>
          ${createDesktopTable(rows)}
          ${createMobileList(rows)}
        </section>
      `;
    }
    function getMachineStatusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s.includes("rendering")) return "st-rendering";
      if (s.includes("idle")) return "st-idle";
      if (s.includes("offline")) return "st-offline";
      if (s.includes("stalled")) return "st-stalled";
      return "";
    }
    function getVisibleMachines(rows) {
      if (showAllMachines) return rows;
      return rows.filter(row => {
        const s = String(row.status || "").toLowerCase();
        return s === "stalled" || s === "offline";
      });
    }

    function createMachinesDesktopTable(rows) {
      return `
        <div class="table-wrap">
          <table class="machines-table">
            <colgroup>
              <col style="width: 20%">
              <col style="width: 20%">
              <col style="width: 60%">
            </colgroup>
            <thead>
              <tr>
                <th>Machine</th>
                <th>Status</th>
                <th>User</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td>${row.machine ?? ""}</td>
                  <td>
                    <span class="machine-status ${getMachineStatusClass(row.status)}">
                      ${row.status ?? ""}
                    </span>
                  </td>
                  <td>${row.user ?? ""}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function createMachinesMobileList(rows) {
      return `
        <div class="machines-mobile-list">
          ${rows.map(row => `
            <div class="machine-card">
              <div class="machine-card-top">
                <div class="machine-name">${row.machine ?? ""}</div>
                <span class="machine-status ${getMachineStatusClass(row.status)}">
                  ${row.status ?? ""}
                </span>
              </div>
              <div class="machine-user">${row.user ?? ""}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function createMachinesSection(rows) {
      const visibleRows = getVisibleMachines(rows);
      const buttonLabel = showAllMachines ? "Show issues only" : "Show all";

      return `
        <section class="machines-section">
          <div class="section-header">
            <div class="section-title">Machines status (${visibleRows.length}/${rows.length})</div>
            <button class="toggle-btn" type="button" onclick="toggleMachinesView()">
              ${buttonLabel}
            </button>
          </div>
          ${createMachinesDesktopTable(visibleRows)}
          ${createMachinesMobileList(visibleRows)}
        </section>
      `;
    }

    function toggleMachinesView() {
      showAllMachines = !showAllMachines;
      if (latestProjectsData) {
        renderAllProjects(latestProjectsData, latestMachinesData);
      }
    }

    function renderAllProjects(projectsData, machinesData) {
      const projectsHtml = Object.entries(projectsData)
        .map(([projectName, rows]) => createProject(projectName, rows))
        .join("");

      const machinesHtml = Array.isArray(machinesData) && machinesData.length
        ? createMachinesSection(machinesData)
        : "";

      document.getElementById("app").innerHTML = projectsHtml + machinesHtml;
    }

    function enableRowSelection() {
      document.querySelectorAll("tbody tr").forEach(row => {
        row.addEventListener("click", () => {
          document.querySelectorAll("tbody tr.selected").forEach(r => {
            r.classList.remove("selected");
          });
          row.classList.add("selected");
        });
      });
    }

    async function loadData() {
      try {
        const ts = Date.now();

        const [projectsResponse, machinesResponse] = await Promise.all([
          fetch("./data.json?_=" + ts, { cache: "no-store" }),
          fetch("./machines_status.json?_=" + ts, { cache: "no-store" })
        ]);

        if (!projectsResponse.ok) {
          throw new Error("data.json HTTP " + projectsResponse.status);
        }

        if (!machinesResponse.ok) {
          throw new Error("machines.json HTTP " + machinesResponse.status);
        }

        const projectsData = await projectsResponse.json();
        const machinesData = await machinesResponse.json();

        latestProjectsData = projectsData;
        latestMachinesData = machinesData;

        renderAllProjects(projectsData, machinesData);
        enableRowSelection();
      } catch (e) {
        console.error("Failed to load json", e);
      }
    }

    loadData();
    setInterval(loadData, 15000);

  </script>
</body>
</html>
