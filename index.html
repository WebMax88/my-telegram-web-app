<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Render Queue</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel-2: #374151;
      --panel-3: #0f172a;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #4b5563;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
      --blue: #3b82f6;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Courier New, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 10px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 18px;
    }

    .project {
      margin-bottom: 24px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .project-header {
      padding: 14px 16px;
      background: var(--panel-2);
      font-size: 18px;
      font-weight: bold;
    }

    .project-count {
      color: var(--muted);
      font-weight: normal;
      font-size: 14px;
      margin-left: 8px;
    }

    .table-wrap {
      overflow-x: auto;
      display: block;
    }

    table {
      width: 100%;
      min-width: 1050px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--panel-2);
      z-index: 1;
    }

    tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    .cards {
      display: none;
      padding: 10px;
      gap: 10px;
    }

    .job-card {
      background: var(--panel-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .job-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .job-name {
      font-size: 15px;
      font-weight: bold;
      line-height: 1.2;
    }

    .job-render {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .status {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .status-queued {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
    }

    .status-rendering {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }

    .status-done {
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 14px;
      margin-bottom: 12px;
    }

    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .field-value {
      font-size: 14px;
      line-height: 1.3;
    }

    .progress-block {
      margin-top: 10px;
    }

    .progress-row {
      margin-bottom: 10px;
    }

    .progress-row:last-child {
      margin-bottom: 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #0b1220;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 20px;
      }

      .table-wrap {
        display: none;
      }

      .cards {
        display: grid;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .job-top {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <h1>Render Queue</h1>
  <div id="app"></div>

  <script>
    const data = {
      "WINLINE_BELARUS": [
        {
          "Task_Progress": "0%",
          "Name": "WLB_050_w_v31-/o",
          "User": "druz",
          "Plugin": "Houdini",
          "Progress": "0%",
          "Tasks": "(0/37)",
          "Status": "Queued",
          "Project": "WINLINE_BELARUS",
          "Render": "Lightnings_hand",
          "est.": "unknown",
          "Priority": "60"
        },
        {
          "Task_Progress": "100%",
          "Name": "WLB_010_v34-/out",
          "User": "shashkov",
          "Plugin": "Houdini",
          "Progress": "34%",
          "Tasks": "(15/44)",
          "Status": "Rendering (2)",
          "Project": "WINLINE_BELARUS",
          "Render": "lightning",
          "est.": "04:16:30",
          "Priority": "60"
        }
      ],
      "T2_INSTRUCTION": [
        {
          "Task_Progress": "100%",
          "Name": "TTI_010_v50-/obj",
          "User": "goncharov",
          "Plugin": "Houdini",
          "Progress": "6%",
          "Tasks": "(4/61)",
          "Status": "Queued",
          "Project": "T2_INSTRUCTION",
          "Render": "usdrender_rop",
          "est.": "unknown",
          "Priority": "60"
        }
      ]
    };

    const columns = [
      "Name",
      "User",
      "Plugin",
      "Render",
      "Status",
      "Progress",
      "Task_Progress",
      "Tasks",
      "est.",
      "Priority"
    ];

    function getStatusClass(status) {
      const s = status.toLowerCase();
      if (s.includes("rendering")) return "status-rendering";
      if (s.includes("queued")) return "status-queued";
      if (s.includes("done")) return "status-done";
      return "";
    }

    function percentToNumber(value) {
      return parseInt(String(value).replace("%", ""), 10) || 0;
    }

    function renderProgress(value) {
      const num = percentToNumber(value);
      return `
        <div class="progress-bar">
          <div class="progress-fill" style="width:${num}%"></div>
        </div>
      `;
    }

    function renderCell(column, row) {
      if (column === "Status") {
        return `<span class="status ${getStatusClass(row[column])}">${row[column]}</span>`;
      }

      if (column === "Progress" || column === "Task_Progress") {
        return `
          <div style="min-width:140px">
            <div style="margin-bottom:6px">${row[column]}</div>
            ${renderProgress(row[column])}
          </div>
        `;
      }

      if (column === "est." && row[column] === "unknown") {
        return `<span class="muted">${row[column]}</span>`;
      }

      return row[column] ?? "";
    }

    function createDesktopTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                ${columns.map(col => `<th>${col}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  ${columns.map(col => `<td>${renderCell(col, row)}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function createMobileCards(rows) {
      return `
        <div class="cards">
          ${rows.map(row => `
            <article class="job-card">
              <div class="job-top">
                <div>
                  <div class="job-name">${row.Name}</div>
                  <div class="job-render">${row.Render}</div>
                </div>
                <span class="status ${getStatusClass(row.Status)}">${row.Status}</span>
              </div>

              <div class="grid">
                <div>
                  <div class="field-label">User</div>
                  <div class="field-value">${row.User}</div>
                </div>
                <div>
                  <div class="field-label">Plugin</div>
                  <div class="field-value">${row.Plugin}</div>
                </div>
                <div>
                  <div class="field-label">Tasks</div>
                  <div class="field-value">${row.Tasks}</div>
                </div>
                <div>
                  <div class="field-label">ETA</div>
                  <div class="field-value ${row["est."] === "unknown" ? "muted" : ""}">${row["est."]}</div>
                </div>
                <div>
                  <div class="field-label">Priority</div>
                  <div class="field-value">${row.Priority}</div>
                </div>
                <div>
                  <div class="field-label">Project</div>
                  <div class="field-value">${row.Project}</div>
                </div>
              </div>

              <div class="progress-block">
                <div class="progress-row">
                  <div class="progress-meta">
                    <span>Progress</span>
                    <span>${row.Progress}</span>
                  </div>
                  ${renderProgress(row.Progress)}
                </div>

                <div class="progress-row">
                  <div class="progress-meta">
                    <span>Task Progress</span>
                    <span>${row.Task_Progress}</span>
                  </div>
                  ${renderProgress(row.Task_Progress)}
                </div>
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function createProject(projectName, rows) {
      return `
        <section class="project">
          <div class="project-header">
            ${projectName}
            <span class="project-count">${rows.length} jobs</span>
          </div>
          ${createDesktopTable(rows)}
          ${createMobileCards(rows)}
        </section>
      `;
    }

    function renderAllProjects(data) {
      const app = document.getElementById("app");
      app.innerHTML = Object.entries(data)
        .map(([projectName, rows]) => createProject(projectName, rows))
        .join("");
    }

    renderAllProjects(data);
  </script>
</body>
</html>
