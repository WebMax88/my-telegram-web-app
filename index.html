<!DOCTYPE html>
<html>
<body>
  <table border="1" id="myTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Имя</th>
        <th>Город</th>
      </tr>
    </thead>
    <tbody>
      <!-- Сюда JavaScript добавит данные -->
    </tbody>
  </table>

  <script>
    // Загружаем данные из файла
    fetch('data.json')
      .then(response => response.json()) // Преобразуем ответ в JSON
      .then(data => {
        const tbody = document.querySelector('#myTable tbody');
        
        // Проходим циклом по массиву объектов
        data.forEach(item => {
          const row = `<tr>
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.city}</td>
          </tr>`;
          tbody.innerHTML += row; // Добавляем строку в таблицу
        });
      })
      .catch(error => console.error('Ошибка загрузки:', error));
  </script>
</body>
</html>
