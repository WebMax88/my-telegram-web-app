<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Render Queue</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111827;
      --panel-2: #1f2937;
      --row-a: #0f172a;
      --row-b: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --border: #273244;
      --green: #4ade80;
      --blue: #60a5fa;
      --yellow: #fbbf24;
      --red: #f87171;
      --bar-bg: #0a0f18;
      --radius: 6px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Verdana, monospace;
      padding: 12px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 12px;
    }

    .project {
      margin-bottom: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
    }

    .project-header {
      padding: 10px 12px;
      background: var(--panel-2);
      font-size: 14px;
      font-weight: normal;
      display: flex;
      justify-content: space-between;
      gap: 5px;
      align-items: center;
    }

    .project-meta {
      font-size: 12px;
      color: var(--muted);
      font-weight: normal;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
      font-size: 10px;
    }

    th {
      background: var(--panel-2);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .mobile-list {
      display: none;
    }

    .m-row {
      padding: 8px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--row-a);
    }

    .m-row:nth-child(even) {
      background: var(--row-b);
    }

    .m-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .m-name {
      min-width: 0;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .m-status {
      font-size: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .queued { color: #f8fafc; }
    .rendering { color: var(--green); }
    .done { color: #86efac; }

    .m-progress-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 5px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bar-bg);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7dd3fc, #60a5fa);
    }

    .m-progress-text {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
    }

    .m-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.2;
    }

    .m-meta strong {
      color: var(--text);
    }

    .status {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .status-queued {
      background: rgba(251, 191, 36, 0.14);
      color: #fbbf24;
    }

    .status-rendering {
      background: rgba(96, 165, 250, 0.14);
      color: #60a5fa;
    }

    .status-done {
      background: rgba(74, 222, 128, 0.14);
      color: #86efac;
    }
    .prio-yellow {
      color: var(--yellow);
    }

    .prio-red {
      color: var(--red);
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .table-wrap {
        display: none;
      }

      .mobile-list {
        display: block;
      }

      .project-header {
        padding: 8px 10px;
        font-size: 14px;
      }

      .project-meta {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <h1>Render Queue</h1>
  <div id="app"></div>

  <script>
    const columns = [
      "Name", "User", "Status",
      "Progress", "Tasks", "est.", "Priority"
    ];

    function getStatusClass(status) {
      const s = status.toLowerCase();
      if (s.includes("rendering")) return "status-rendering";
      if (s.includes("queued")) return "status-queued";
      if (s.includes("done")) return "status-done";
      return "";
    }

    function getStatusTextClass(status) {
      const s = status.toLowerCase();
      if (s.includes("rendering")) return "rendering";
      if (s.includes("queued")) return "queued";
      if (s.includes("done")) return "done";
      return "";
    }

    function percentToNumber(value) {
      return parseInt(String(value).replace("%", ""), 10) || 0;
    }

    function renderDesktopProgress(value) {
      const num = percentToNumber(value);
      return `
        <div style="display:flex;align-items:center;gap:8px;min-width:140px;">
          <div class="progress-bar" style="width:90px;">
            <div class="progress-fill" style="width:${num}%"></div>
          </div>
          <span>${value}</span>
        </div>
      `;
    }
    
    function getPriorityClass(priority) {
      const p = parseInt(priority, 10) || 0;
      if (p > 75) return "prio-red";
      if (p > 60) return "prio-yellow";
      return "";
    }

    function renderCell(column, row) {
      if (column === "Status") {
        return `<span class="status ${getStatusClass(row[column])}">${row[column]}</span>`;
      }
      if (column === "Name") {
        return row["Task_name"];  // вместо row["Name"]
      }
      if (column === "Progress" || column === "Task_Progress") {
        return renderDesktopProgress(row[column]);
      }
      if (column === "Priority") {
        const cls = getPriorityClass(row.Priority);
        return `<span class="${cls}">${row.Priority}</span>`;
      }
      return row[column] ?? "";
    }

    function createDesktopTable(rows) {
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                ${columns.map(col => `<th>${col}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  ${columns.map(col => `<td>${renderCell(col, row)}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function createMobileList(rows) {
      return `
        <div class="mobile-list">
          ${rows.map(row => {
            const progressNum = percentToNumber(row.Progress);
            return `
              <div class="m-row">
                <div class="m-top">
                  <div class="m-name">${row.Task_name}</div>
                  
                </div>

                <div class="m-progress-line">
                  <div class="progress-bar">
                    <div class="progress-fill" style="width:${progressNum}%"></div>
                  </div>
                  <div class="m-progress-text">${row.Progress} ${row.Tasks}</div>
                </div>

                <div class="m-meta">
                  <div class="m-status ${getStatusTextClass(row.Status)}">${row.Status}</div>
                  <span class="${getPriorityClass(row.Priority)}">Priority: ${row.Priority}</span>
                  <span>ETA ${row["est."]}</span>
                  <span><strong>${row.User}</strong></span>
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function createProject(projectName, rows) {
      return `
        <section class="project">
          <div class="project-header">
            <span>${projectName}</span>
            <span class="project-meta">${rows.length} jobs</span>
          </div>
          ${createDesktopTable(rows)}
          ${createMobileList(rows)}
        </section>
      `;
    }

    function renderAllProjects(data) {
      document.getElementById("app").innerHTML = Object.entries(data)
        .map(([projectName, rows]) => createProject(projectName, rows))
        .join("");
    }

    async function loadData() {
      try {
        const response = await fetch("./data.json?_=" + Date.now(), {
          cache: "no-store"
        });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const data = await response.json();
        renderAllProjects(data);
      } catch (e) {
        console.error("Failed to load data.json", e);
      }
    }

    loadData();
    setInterval(loadData, 15000);

  </script>
</body>
</html>
