<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Render Queue Compact</title>
  <style>
    :root {
      --bg: #05070b;
      --row-a: #10151d;
      --row-b: #0c1118;
      --header-bg: #181f29;
      --border: #222b39;
      --text: #e5edf7;
      --muted: #8b9bb0;
      --bar-bg: #050910;
      --blue: #60a5fa;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f97373;
      --fs-xs: 10px;
      --fs-sm: 11px;
      --fs-md: 12px;
    }

    * { box-sizing: border-box; }
    html { color-scheme: dark; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: var(--fs-md);
    }

    .app {
      max-width: 1400px;
      margin: 0 auto;
      padding: 6px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 6px 6px 4px;
      background: linear-gradient(180deg, #05070b, rgba(5,7,11,0.9));
      border-bottom: 1px solid #151b24;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #cbd5e4;
    }

    .meta {
      font-size: var(--fs-xs);
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(0,2fr) minmax(0,1.5fr) auto;
      gap: 4px;
    }

    input, select, button {
      border-radius: 6px;
      border: 1px solid #1f2933;
      background: #0e141d;
      color: var(--text);
      padding: 4px 8px;
      font: inherit;
      min-height: 26px;
    }

    button {
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .table-wrap {
      margin-top: 4px;
      border-radius: 6px;
      border: 1px solid var(--border);
      overflow: auto;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 960px;
      font-size: var(--fs-md);
    }

    thead {
      background: var(--header-bg);
      position: sticky;
      top: calc(40px); /* высота topbar примерно */
      z-index: 5;
    }

    th, td {
      padding: 2px 6px;
      border-bottom: 1px solid #161d28;
      white-space: nowrap;
      font-weight: 400;
    }

    th {
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #9ca9bd;
    }

    tbody tr:nth-child(odd) { background: var(--row-a); }
    tbody tr:nth-child(even) { background: var(--row-b); }

    tbody tr:hover td {
      background: #172131;
    }

    .col-job {
      max-width: 260px;
      overflow: hidden;
    }

    .name-line {
      display: flex;
      align-items: baseline;
      gap: 4px;
      font-size: var(--fs-md);
    }

    .job-name-main {
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .job-name-render {
      color: var(--muted);
      font-size: var(--fs-sm);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row2 {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
      font-size: var(--fs-xs);
      color: var(--muted);
    }

    .bar {
      width: 70px;
      height: 6px;
      border-radius: 999px;
      background: var(--bar-bg);
      overflow: hidden;
      flex-shrink: 0;
    }

    .fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7dd3fc, #3b82f6);
    }

    .status {
      font-size: var(--fs-sm);
      font-weight: 600;
      white-space: nowrap;
    }

    .status-rendering { color: var(--green); }
    .status-queued { color: #e5edf7; }
    .status-done { color: #9ae6b4; }
    .status-error { color: var(--red); }

    .eta {
      font-variant-numeric: tabular-nums;
    }

    .prio-high { color: var(--yellow); }
    .prio-top { color: var(--red); }

    .user {
      font-size: var(--fs-sm);
    }

    .compact {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    @media (max-width: 800px) {
      body { font-size: var(--fs-sm); }
      table { min-width: 0; }
      th:nth-child(3), th:nth-child(5),
      td:nth-child(3), td:nth-child(5) {
        display: none; /* скрываем Plugin и Task_Progress на мобиле */
      }
      .col-job { max-width: 220px; }
      .bar { width: 60px; }
      .toolbar {
        grid-template-columns: minmax(0,1.5fr) minmax(0,1.3fr);
      }
      .toolbar button { grid-column: span 2; }
    }
  </style>
</head>

    const state = {
      raw: data,
      query: '',
      status: 'all',
      sort: 'rendering-first'
    };

    const rowsEl = document.getElementById('rows');
    const metaEl = document.getElementById('metaInfo');

    function percent(value) {
      return parseInt(String(value||'').replace('%',''), 10) || 0;
    }

    function statusType(status='') {
      const s = status.toLowerCase();
      if (s.includes('rendering')) return 'rendering';
      if (s.includes('queued')) return 'queued';
      if (s.includes('complete')) return 'done';
      if (s.includes('error') || s.includes('fail')) return 'error';
      return 'other';
    }

    function statusWeight(status='') {
      const t = statusType(status);
      if (t === 'rendering') return 0;
      if (t === 'error') return 1;
      if (t === 'queued') return 2;
      if (t === 'done') return 3;
      return 4;
    }

    function priorityClass(p) {
      const v = parseInt(p,10) || 0;
      if (v >= 90) return 'prio-top';
      if (v >= 75) return 'prio-high';
      return '';
    }

    function normalize(data) {
      return Object.entries(data).flatMap(([project, arr]) =>
        arr.map((row, i) => ({...row, __project: project, __id: `${project}_${i}`}))
      );
    }

    function filterRows(rows) {
      const q = state.query.trim().toLowerCase();
      return rows.filter(r => {
        if (state.status !== 'all' && statusType(r.Status) !== state.status) return false;
        if (!q) return true;
        const hay = `${r.Name} ${r.Render} ${r.User} ${r.Project}`.toLowerCase();
        return hay.includes(q);
      });
    }

    function sortRows(rows) {
      return [...rows].sort((a,b) => {
        if (state.sort === 'rendering-first') {
          const sw = statusWeight(a.Status) - statusWeight(b.Status);
          if (sw !== 0) return sw;
        }
        const p = percent(b.Progress) - percent(a.Progress);
        if (p !== 0) return p;
        const pr = (parseInt(b.Priority,10)||0) - (parseInt(a.Priority,10)||0);
        if (pr !== 0) return pr;
        return a.Name.localeCompare(b.Name);
      });
    }

    function render() {
      const all = normalize(state.raw);
      const filtered = filterRows(all);
      const sorted = sortRows(filtered);

      metaEl.textContent = `projects: ${Object.keys(state.raw).length}, jobs: ${all.length}, shown: ${sorted.length}`;

      rowsEl.innerHTML = sorted.map(r => {
        const p = percent(r.Progress);
        const st = statusType(r.Status);
        const eta = r["est."] === 'unknown' ? '—' : r["est."];

        return `
          <tr>
            <td>${r.Project}</td>
            <td class="col-job">
              <div class="compact">
                <div class="name-line">
                  <span class="job-name-main">${r.Name}</span>
                  <span class="job-name-render">${r.Render}</span>
                </div>
                <div class="row2">
                  <div class="bar"><div class="fill" style="width:${p}%"></div></div>
                  <span>${r.Progress}</span>
                  <span>${r.Tasks}</span>
                </div>
              </div>
            </td>
            <td>${r.Plugin}</td>
            <td class="user">${r.User}</td>
            <td>${r.Task_Progress}</td>
            <td>${r.Progress}</td>
            <td class="status status-${st}">${r.Status}</td>
            <td class="eta">${eta}</td>
            <td class="${priorityClass(r.Priority)}">${r.Priority}</td>
          </tr>
        `;
      }).join('');
    }

    document.getElementById('search').addEventListener('input', e => {
      state.query = e.target.value;
      render();
    });

    document.getElementById('status').addEventListener('change', e => {
      state.status = e.target.value;
      render();
    });

    document.getElementById('sort').addEventListener('click', () => {
      state.sort = state.sort === 'rendering-first' ? 'progress-first' : 'rendering-first';
      document.getElementById('sort').textContent =
        state.sort === 'rendering-first' ? 'Rendering first' : 'Progress first';
      render();
    });

    render();
  </script>
